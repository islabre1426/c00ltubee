<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" type="text/css" href="style.css">

	<title>c00ltubee</title>
</head>
<body>
	<section id="content">
		<header>
		  <span id="title">c00ltubee</span>

      <nav>
        <button id="nav-prev">&lt;</button>
        <hr class="vr">
        <span id="nav-indicator">Home</span>
        <hr class="vr">
        <button id="nav-next">&gt;</button>
      </nav>
		</header>

    <div class="content-main active" data-page="Home">
      <main></main>
  
      <footer class="footer-buttons">
        <button id="add-urls-button">Add URLs</button>
        <hr class="vr">
        <button id="clear-history-button">Clear History</button>
      </footer>
    </div>

    <div class="content-main" data-page="Settings">
      <main></main>

      <footer class="footer-buttons paged">
        <button id="footer-prev">&lt;</button>
        <hr class="vr">
        <span id="footer-indicator"></span>
        <hr class="vr">
        <button id="footer-next">&gt;</button>
      </footer>
    </div>
	</section>
  <div id="sidebar">
    <section id="sidebar-main"></section>
    <button id="sidebar-button">&gt;</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
